<div class="section">
  <h2>Product List</h2>
  
  <!-- Filter Controls -->
  <div class="filter-controls">
    <button class="toggle-button" (click)="toggleInStockFilter()">
      {{ showOnlyInStock() ? 'Show All Products' : 'Show Only In Stock' }}
    </button>
    
    <input 
      type="text" 
      placeholder="Search products..." 
      (input)="updateFilter($any($event).target.value)"
      [value]="filterText()"
      class="search-input"
    />
    
    <button class="toggle-button clear-btn" (click)="clearFilter()" *ngIf="filterText()">
      Clear Filter
    </button>
  </div>

  <!-- Display products with both *ngIf and *ngFor -->
  <!-- This demonstrates the requested structural directives usage -->
  <!-- Using ng-container to wrap multiple directives, then looping products inside -->
  <ng-container *ngIf="filteredProducts().length > 0; else noProducts">
    <div 
      *ngFor="let product of filteredProducts()"
      class="item"
    >
      <div class="item-title">{{ product.name }}</div>
      <div class="item-description">{{ product.description }}</div>
      <div class="item-details">
        <span class="item-price">${{ product.price }}</span>
        <span class="stock-status" [class.in-stock]="product.inStock">
          {{ product.inStock ? '✓ In Stock' : '✗ Out of Stock' }}
        </span>
      </div>
    </div>
  </ng-container>

  <!-- No products template -->
  <ng-template #noProducts>
    <div class="empty-message">
      No products found. Try adjusting your filters.
    </div>
  </ng-template>

  <!-- Display count info -->
  <div class="info-footer" *ngIf="filteredProducts().length > 0">
    Showing {{ filteredProducts().length }} product(s)
  </div>
</div>
